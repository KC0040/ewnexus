<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <!-- Nexus node mark -->
  <g transform="translate(0,4)">
    <!-- Center diamond -->
    <rect x="16" y="8" width="8" height="8" rx="1" fill="#5af0b3" transform="rotate(45 20 12)"/>
    <!-- Connection lines -->
    <line x1="20" y1="5"  x2="20" y2="0"  stroke="#5af0b3" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
    <line x1="20" y1="19" x2="20" y2="24" stroke="#5af0b3" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
    <line x1="5"  y1="12" x2="0"  y2="12" stroke="#5af0b3" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
    <line x1="35" y1="12" x2="40" y2="12" stroke="#5af0b3" stroke-width="1.5" stroke-linecap="round" opacity=".5"/>
    <!-- Corner dots -->
    <circle cx="20" cy="0"  r="2" fill="#5af0b3" opacity=".35"/>
    <circle cx="20" cy="24" r="2" fill="#5af0b3" opacity=".35"/>
    <circle cx="0"  cy="12" r="2" fill="#5af0b3" opacity=".35"/>
    <circle cx="40" cy="12" r="2" fill="#5af0b3" opacity=".35"/>
  </g>

  <!-- EW wordmark -->
  <text x="52" y="32" font-family="'Space Grotesk', 'Arial Black', sans-serif" font-weight="900" font-size="22" letter-spacing="-0.04em" fill="#e8fdf4">EW</text>

  <!-- NEXUS wordmark -->
  <text x="88" y="32" font-family="'Space Grotesk', 'Arial', sans-serif" font-weight="400" font-size="22" letter-spacing="-0.01em" fill="#5af0b3">NEXUS</text>

  <!-- Tagline -->
  <text x="52" y="43" font-family="'DM Mono', 'Courier New', monospace" font-size="7" letter-spacing="0.18em" fill="rgba(232,253,244,0.4)">DIGITAL AGENCY</text>
</svg>
