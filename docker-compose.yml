version: "3.9"

services:
  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: ewnexus-chatbot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./chatbot/.env
    volumes:
      # Mount clients/ so you can add/update client configs without rebuilding
      - ./chatbot/clients:/app/clients
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
