  /* ═══════════════════════════════════════════════════════════
     AUTO HEAD INJECTION — SEO / GEO / Schema / Theme
     ▼ 以下不需要修改 ▼
     ═══════════════════════════════════════════════════════════ */
  (function injectHead(){
    const b = SITE.business, s = SITE.seo, t = SITE.theme;

    /* Title */
    document.title = s.title;

    /* Helper to add <meta> */
    function meta(attrs) {
      const el = document.createElement('meta');
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
      document.head.appendChild(el);
    }
    function link(attrs) {
      const el = document.createElement('link');
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
      document.head.appendChild(el);
    }

    /* Core SEO */
    meta({ name:"description",   content: s.description });
    meta({ name:"keywords",      content: s.keywords.join(", ") });
    meta({ name:"robots",        content: "index, follow" });

    /* GEO */
    meta({ name:"geo.region",    content:`US-${b.state}` });
    meta({ name:"geo.placename", content:`${b.city}, ${b.state_full}` });
    meta({ name:"geo.position",  content:`${s.lat};${s.lng}` });
    meta({ name:"ICBM",          content:`${s.lat}, ${s.lng}` });

    /* Open Graph */
    meta({ property:"og:type",        content:"website" });
    meta({ property:"og:title",       content:`${b.name} — ${b.city}, ${b.state}` });
    meta({ property:"og:description", content: s.description });
    meta({ property:"og:url",         content: s.canonical });

    /* Canonical */
    link({ rel:"canonical", href: s.canonical });

    /* Theme CSS variable */
    const style = document.createElement('style');
    style.textContent = `:root{--accent:${t.accent};--accent-dark:${t.accent_dark};--border:${hexToRgba(t.accent,0.15)};}`;
    document.head.appendChild(style);

    /* Schema.org JSON-LD */
    const schema = {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": [s.schema_type, "LocalBusiness"],
          "name": b.name,
          "telephone": b.phone,
          "email": b.email,
          "address": {
            "@type": "PostalAddress",
            "streetAddress": b.address,
            "addressLocality": b.city,
            "addressRegion": b.state,
            "postalCode": b.zip,
            "addressCountry": "US"
          },
          "geo": { "@type":"GeoCoordinates", "latitude": s.lat, "longitude": s.lng },
          "areaServed": b.area_served,
          "priceRange": s.price_range,
          "openingHours": s.opening_hours,
          "aggregateRating": {
            "@type":"AggregateRating",
            "ratingValue": String(SITE.reviews.avg),
            "reviewCount": String(SITE.reviews.count)
          }
        },
        {
          "@type": "FAQPage",
          "mainEntity": SITE.faq.map(f=>({
            "@type":"Question","name":f.q,
            "acceptedAnswer":{"@type":"Answer","text":f.a}
          }))
        }
      ]
    };
    const ld = document.createElement('script');
    ld.type = 'application/ld+json';
    ld.textContent = JSON.stringify(schema);
    document.head.appendChild(ld);
  })();

  /* Hex → rgba helper */
  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16),
          g = parseInt(hex.slice(3,5),16),
          b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

          </div>
          <div class="form-group">
            <label class="form-label" for="cf-phone">${h.form_field2_label}</label>
            <input id="cf-phone" class="form-input" type="tel" placeholder="${h.form_field2_placeholder}" required/>
          </div>
          <div class="form-group">
            <label class="form-label">${h.form_field3_label}</label>
            <select class="form-input inv-select" id="cf-service" style="width:100%">
              <option value="">Select…</option>
              ${h.form_services.map(s=>`<option>${s}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="cf-msg">${h.form_field4_label}</label>
            <input id="cf-msg" class="form-input" type="text" placeholder="${h.form_field4_placeholder}"/>
          </div>
          <button type="submit" class="form-submit" id="cf-btn">Send Quote Request</button>
          <div id="cf-ok" style="display:none;text-align:center;padding:var(--sp-5) 0;color:#34d399;font-weight:600;">
            ✅ Got it! We'll call you within 30 minutes.
          </div>
        </form>
      </div>
    </div>`;

  /* ── Trust Stats ── */
  document.getElementById('stats').innerHTML = `
    <div class="trust-bar-inner">
      ${SITE.stats.map(s=>`<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join('')}
    </div>`;

  /* ── Brands (optional) ── */
  if (SITE.brands && SITE.brands.length) {
    document.getElementById('brands').innerHTML = `
      <span style="font-size:12px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-right:8px;">Brands in stock:</span>
      ${SITE.brands.map(br=>`<span class="brand-chip">${br}</span>`).join('')}
      <span class="brand-chip">+ More</span>`;
  } else {
    document.getElementById('brands').style.display = 'none';
  }

  /* ── Services ── */
  document.getElementById('services').innerHTML = `
    <div class="section-wrap">
      <div class="section-header">
        <p class="eyebrow">What We Do</p>
        <h2>Our Services</h2>
        <p>Located in ${b.city}, ${b.state_full}, ${b.name} serves ${b.area_served.slice(0,3).join(', ')} and the surrounding area.</p>
      </div>
      <div class="grid-3">
        ${SITE.services.map(s=>`
          <article class="svc-card">
            <div class="svc-icon"><span class="material-symbols-outlined">${s.icon}</span></div>
            <h3>${s.name}</h3>
            <p>${s.desc}</p>
            <div class="svc-price">${s.price}</div>
          </article>`).join('')}
      </div>
    </div>`;

  /* ── Inventory (optional) ── */
  const invEl = document.getElementById('inventory');
  if (SITE.inventory && SITE.inventory.items.length) {
    const inv = SITE.inventory;
    const uniqueVals = (key) => [...new Set(inv.items.map(i=>i[key]))].sort();
    const filterSelects = inv.filters.map(f => `
      <div class="inv-fg">
        <label>${f.charAt(0).toUpperCase()+f.slice(1)}</label>
        <select id="f-${f}" class="inv-select" onchange="filterInv()">
          <option value="">All ${f.charAt(0).toUpperCase()+f.slice(1)}s</option>
          ${uniqueVals(f).map(v=>`<option>${v}</option>`).join('')}
        </select>
      </div>`).join('');

    invEl.innerHTML = `
      <div class="section-wrap">
        <div class="section-header">
          <p class="eyebrow">In Stock Now</p>
          <h2>Inventory</h2>
          <p>Browse available stock. Call to confirm availability.</p>
        </div>
        <div class="inv-filters">
          ${filterSelects}
          <button class="inv-reset" onclick="resetInv()">Reset</button>
        </div>
        <p class="inv-count">Showing <span id="inv-n">${inv.items.length}</span> of ${inv.items.length} items</p>
        <div id="inv-wrap">
          <table class="inv-table" id="inv-tbl">
            <thead><tr>${Object.keys(inv.items[0]).map(k=>`<th>${k}</th>`).join('')}</tr></thead>
            <tbody id="inv-body"></tbody>
          </table>
        </div>
        <p style="font-size:13px;color:var(--text-muted);margin-top:var(--sp-4);">
          * Don't see your size? Call <a href="tel:${b.phone_raw}" style="color:var(--accent);font-weight:600;">${b.phone}</a> — we can order anything.
        </p>
      </div>`;
    renderInv(inv.items);
  } else {
    invEl.style.display = 'none';
  }

  /* ── Reviews ── */
  const rv = SITE.reviews;
  const stars = n => '★'.repeat(n) + '☆'.repeat(5-n);
  document.getElementById('reviews').innerHTML = `
    <div class="section-wrap">
      <div class="section-header">
        <p class="eyebrow">What Customers Say</p>
        <h2>Real Reviews</h2>
      </div>
      <div class="rating-box">
        <div class="rating-num">${rv.avg}</div>
        <div>
          <div class="rating-stars">${stars(Math.round(rv.avg))}</div>
          <div style="font-weight:700;font-size:16px;margin-bottom:2px;">Excellent</div>
          <div class="rating-sub">Based on ${rv.count} ${rv.source_label} reviews</div>
        </div>
      </div>
      <div class="grid-2">
        ${rv.items.map(r=>`
          <div class="review-card">
            <div class="review-stars">${stars(r.rating)}</div>
            <p class="review-text">"${r.text}"</p>
            <div class="review-author">${r.author} <span style="font-weight:400;color:var(--text-muted)">· ${r.date}</span></div>
          </div>`).join('')}
      </div>
    </div>`;

  /* ── FAQ ── */
  document.getElementById('faq').innerHTML = `
    <div class="faq-inner">
      <div style="margin-bottom:var(--sp-8)">
        <p class="eyebrow">Common Questions</p>
        <h2>FAQs</h2>
      </div>
      ${SITE.faq.map(f=>`
        <div class="faq-item">
          <button class="faq-btn" onclick="toggleFaq(this)" aria-expanded="false">
            ${f.q}
            <span class="material-symbols-outlined faq-icon">add</span>
          </button>
          <div class="faq-ans">${f.a}</div>
        </div>`).join('')}
    </div>`;

  /* ── CTA band ── */
  document.getElementById('cta').innerHTML = `
    <div class="glow-blob" style="width:600px;height:400px;background:${t.accent};top:50%;left:50%;transform:translate(-50%,-50%);opacity:.08"></div>
    <div class="cta-inner">
      <p class="eyebrow">Ready?</p>
      <h2>Walk In Today — No Appointment Needed</h2>
      <p>Serving ${b.area_served.join(' · ')}.</p>
      <div class="cta-actions">
        <a href="tel:${b.phone_raw}" class="btn btn-primary">
          <span class="material-symbols-outlined" style="font-size:18px">call</span>
          Call ${b.phone}
        </a>
        <a href="#quote" class="btn btn-outline">Get a Free Quote</a>
      </div>
    </div>`;

  /* ── Info bar ── */
  document.getElementById('info').innerHTML = `
    <div class="info-bar-inner">
      <div class="info-block">
        <h4>Location</h4>
        <address>
          ${b.address}<br/>${b.city}, ${b.state} ${b.zip}<br/>
          <a href="tel:${b.phone_raw}">${b.phone}</a><br/>
          <a href="mailto:${b.email}">${b.email}</a>
        </address>
      </div>
      <div class="info-block">
        <h4>Hours</h4>
        <p>${b.hours.weekday}<br/>${b.hours.saturday}<br/>${b.hours.sunday}</p>
      </div>
      <div class="info-block">
        <h4>Service Area</h4>
        <p>${b.area_served.join(' · ')}</p>
      </div>
    </div>`;

  /* ── Footer ── */
  document.getElementById('footer').innerHTML = `
    <div class="footer-inner">
      <p class="footer-copy">© ${new Date().getFullYear()} ${b.name} · ${b.address}, ${b.city} ${b.state} ${b.zip}</p>
      <p class="ew-footer-tag">Website by <a href="https://www.ewnexus.com">EWNexus</a> · $600 · 3-day launch</p>
    </div>`;
});

/* ── Inventory filter ── */
function filterInv() {
  if (!SITE.inventory) return;
  const items = SITE.inventory.items;
  const filters = SITE.inventory.filters;
  const result = items.filter(item =>
    filters.every(f => {
      const val = document.getElementById('f-'+f)?.value;
      return !val || item[f] === val;
    })
  );
  renderInv(result);
}

function renderInv(items) {
  const keys = Object.keys(SITE.inventory.items[0]);
  const tbody = document.getElementById('inv-body');
  if (!tbody) return;
  document.getElementById('inv-n').textContent = items.length;
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="${keys.length}" style="text-align:center;color:var(--text-muted);padding:32px;">No items match. <a href="tel:${SITE.business.phone_raw}" style="color:var(--accent)">Call us</a> — we can order any size.</td></tr>`;
    return;
  }
  tbody.innerHTML = items.map(item => `<tr>${keys.map(k => {
    if (k === 'condition') return `<td><span class="inv-badge ${item[k]==='New'?'new':'used'}">${item[k]}</span></td>`;
    if (k === 'price')     return `<td style="color:var(--accent);font-weight:700;font-family:var(--font-mono)">${item[k]}</td>`;
    if (k === 'brand')     return `<td style="font-weight:600">${item[k]}</td>`;
    if (k === 'size')      return `<td style="font-family:var(--font-mono);font-size:13px">${item[k]}</td>`;
    return `<td>${item[k]}</td>`;
  }).join('')}</tr>`).join('');
}

function resetInv() {
  SITE.inventory.filters.forEach(f => {
    const el = document.getElementById('f-'+f);
    if (el) el.value = '';
  });
  renderInv(SITE.inventory.items);
}

/* ── FAQ toggle ── */
function toggleFaq(btn) {
  const ans = btn.nextElementSibling;
  const open = btn.getAttribute('aria-expanded') === 'true';
  document.querySelectorAll('.faq-btn').forEach(b => {
    b.setAttribute('aria-expanded','false');
    b.nextElementSibling.classList.remove('open');
  });
  if (!open) { btn.setAttribute('aria-expanded','true'); ans.classList.add('open'); }
}

/* ── Form submit ── */
async function submitForm(e) {
  e.preventDefault();
  const btn = document.getElementById('cf-btn');
  btn.textContent = 'Sending…'; btn.disabled = true;
  try {
    await fetch('/api/contact', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name:    document.getElementById('cf-name').value,
        phone:   document.getElementById('cf-phone').value,
        service: document.getElementById('cf-service')?.value,
        message: document.getElementById('cf-msg').value,
        source:  SITE.ewnexus.slug
      })
    });
  } catch(_) {}
  document.getElementById('cf').style.display = 'none';
  document.getElementById('cf-ok').style.display = 'block';
}
</script>
